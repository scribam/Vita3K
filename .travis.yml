language: cpp

cache: ccache

matrix:
  include:
    - os: osx
      osx_image: xcode9.3
      install:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
      - export PATH="/usr/local/opt/ccache/libexec:$PATH"
      before_script:
      - export CMAKE=cmake
      script: bash $TRAVIS_BUILD_DIR/.travis/$TRAVIS_OS_NAME/build.sh
      before_deploy:
      - git tag "$TRAVIS_BRANCH-v$TRAVIS_BUILD_NUMBER"
      - zip -j "$TRAVIS_BRANCH-$TRAVIS_OS_NAME-v$TRAVIS_BUILD_NUMBER.zip" ${TRAVIS_BUILD_DIR}/build/bin/Vita3K.app
      deploy:
        provider: releases
        api_key: $GITHUB_OAUTH_TOKEN
        file: "$TRAVIS_BRANCH-$TRAVIS_OS_NAME-v$TRAVIS_BUILD_NUMBER.zip"
        skip_cleanup: true
        on:
          branch: travis-deploy-releases
          tags: false
    - os: linux
      services: docker
      script: bash $TRAVIS_BUILD_DIR/.travis/$TRAVIS_OS_NAME/build.sh
      before_deploy:
      - git tag "$TRAVIS_BRANCH-v$TRAVIS_BUILD_NUMBER"
      - zip -j "$TRAVIS_BRANCH-$TRAVIS_OS_NAME-v$TRAVIS_BUILD_NUMBER.zip" ${TRAVIS_BUILD_DIR}/build/bin/*
      deploy:
        provider: releases
        api_key: $GITHUB_OAUTH_TOKEN
        file: "$TRAVIS_BRANCH-$TRAVIS_OS_NAME-v$TRAVIS_BUILD_NUMBER.zip"
        skip_cleanup: true
        on:
          branch: travis-deploy-releases
          tags: false

env:
  global:
    secure: 
